<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#18211c">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>最新预测</title>
  <link rel="stylesheet" href="styles.css?v=20260722-1">
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">六合彩分析</p>
        <h1 id="issue-title">最新一期预测</h1>
      </div>
      <button id="refresh" type="button" title="刷新最新预测" aria-label="刷新最新预测">↻</button>
    </header>

    <section id="state" class="state" aria-live="polite">正在读取最新预测...</section>
    <section id="prediction" hidden>
      <div class="summary">
        <div><span>生成时间</span><strong id="generated-at">-</strong></div>
        <div><span>运行状态</span><strong id="status">-</strong></div>
        <div><span>依据开奖期</span><strong id="source-issue">-</strong></div>
        <div><span>预测功能</span><strong>4 类全部完成</strong></div>
      </div>

      <nav class="result-nav" aria-label="预测结果分类">
        <a href="#ai-section">四周期AI</a>
        <a href="#rule-section">特码规律</a>
        <a href="#score-section">综合评分</a>
        <a href="#ensemble-section">集成模型</a>
      </nav>

      <div id="ai-section" class="result-section">
        <h2>AI生肖预测</h2>
        <div id="ai-periods" class="period-grid"></div>
      </div>

      <div id="rule-section" class="result-section rule-section">
        <h2>特码规律验证预测</h2>
        <p id="rule-formula" class="detail-line"></p>
        <div id="rule-zodiacs" class="tokens secondary"></div>
      </div>

      <div id="score-section" class="result-section">
        <h2>综合评分预测</h2>
        <div id="score-results" class="ranking"></div>
      </div>

      <div id="ensemble-section" class="result-section ensemble-section">
        <h2>集成模型预测</h2>
        <div id="ensemble-results" class="ranking"></div>
      </div>
    </section>
  </main>
  <script src="app.js?v=20260722-1" defer></script>
</body>
</html>
